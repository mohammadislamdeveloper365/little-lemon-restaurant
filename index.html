    <main>
        <h1>Sign Up</h1>
        <form action="#" method="post">
            <div>
                <label for="user_first_name">First name</label><br /><input type="text" id="user_first_name"
                    name="user_first_name" required>
            </div>
            <div>
                <label for="user_last_name">Last Name</label><br /><input type="user_last_name" id="user_last_name"
                    name="user_last_name">
            </div>
            <div><label for="user_email">Email</label><br /><input type="email" id="user_email" name="user_email"
                    required></div>
            <div><label for="user_password">Password</label><br /><input type="password" id="user_password"
                    name="user_password" required></div>
            <div><label for="user_confirmation_password">Confirm password</label><br /><input type="password"
                    id="user_confirmation_password" name="user_confirmation_password" required></div>
            <div>
                <label for="male">Male</label>
                <input type="radio" name="gender" id="male" value="male">
                <label for="female">Female</label>
                <input type="radio" name="gender" id="female" value="female">
            </div>
            <div>
                <button type="submit">Sign Up</button>
            </div>
        </form>
        <article>
            <h2>20% off this week</h2>
            <p>Hello everyone for the discount</p>
        </article>
        <article>
            <h2>Our new menu</h2>
            <p>We have a lot of exciting menus here!!!</p>
